<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Darshan | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* ---------- BACKGROUND ---------- */
.bg-skeleton{
    position:fixed;
    inset:0;
    background:#dfe3ea;
    animation:pulse 1.6s infinite;
    z-index:-2;
}

.bg-image{
    position:fixed;
    inset:0;
    background:url("/img/start.png") center/cover no-repeat;
    opacity:0;
    transition:opacity 1.2s ease;
    z-index:-1;
}

.bg-image.show{
    opacity:1;
}

@keyframes pulse{
    0%,100%{opacity:.6;}
    50%{opacity:1;}
}

/* ---------- CARD ---------- */
.container{
    position:relative;
    background:white;
    padding:50px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    max-width:700px;
    width:90%;
    overflow:hidden;
}

/* ---------- SKELETON ---------- */
.skeleton{
    position:absolute;
    inset:0;
    padding:50px;
    transition:opacity .7s ease;
}

.skeleton.hide{
    opacity:0;
    pointer-events:none;
}

.skeleton div{
    background:#e5e7eb;
    border-radius:6px;
    margin-bottom:15px;
    animation:pulse 1.4s infinite;
}

.title{height:28px;width:70%;}
.text{height:14px;width:100%;}
.short{width:60%;}
.btn-skel{height:35px;width:120px;}

/* ---------- REAL CONTENT ---------- */
.content{
    opacity:0;
    transform:scale(.96) translateY(10px);
    transition:
        opacity .8s ease,
        transform .8s cubic-bezier(.22,1,.36,1);
}

.content.show{
    opacity:1;
    transform:scale(1) translateY(0);
}

h1{margin-bottom:15px;}
p{
    color:#555;
    margin-bottom:25px;
    line-height:1.6;
}

.btn{
    padding:10px 18px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:6px;
    transition:.3s;
}

.btn:hover{
    background:#333;
}

</style>
</head>

<body>

<!-- Background -->
<div class="bg-skeleton" id="bgSkeleton"></div>
<div class="bg-image" id="bgImage"></div>

<div class="container">

<!-- Skeleton -->
<div id="contentSkeleton" class="skeleton">
    <div class="title"></div>
    <div class="text"></div>
    <div class="text"></div>
    <div class="text short"></div>
    <div class="btn-skel"></div>
</div>

<!-- Real Content -->
<div id="realContent" class="content">
<h1>
<img src="https://raw.githubusercontent.com/Divya-Darshan/Divya-Darshan/refs/heads/main/gif/hi.gif"
height="40" style="vertical-align:middle;">
Hi, I'm Divya Darshan
</h1>

<p>
I'm a fresher developer focused on building practical solutions.
I enjoy working with open-source tools and experimenting with systems.
Currently exploring opportunities to grow as a developer.
</p>

<a href="https://github.com/Divya-Darshan"
target="_blank"
class="btn">GitHub</a>
</div>

</div>

<script>

/* Background preload */
const img = new Image();
img.src="/img/start.png";

img.onload=()=>{
    document.getElementById("bgImage").classList.add("show");
    document.getElementById("bgSkeleton").style.opacity="0";
};

/* Smooth skeleton transition */
window.addEventListener("load",()=>{

    setTimeout(()=>{

        document
          .getElementById("contentSkeleton")
          .classList.add("hide");

        document
          .getElementById("realContent")
          .classList.add("show");

    },1000);

});
</script>

</body>
</html>
